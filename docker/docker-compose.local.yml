# Local build compose file - builds from source instead of pulling from Docker Hub.
#
# First run (or after Dockerfile changes):
#   docker compose -f docker/docker-compose.local.yml up -d --build
#   # or: HOST_PORT=27016 docker compose -f docker/docker-compose.local.yml up -d --build
#
# Subsequent runs (container restarts without forcing a rebuild):
#   docker compose -f docker/docker-compose.local.yml up -d
#
# Use this when you've cloned the repository and want to build from source.
#
# Default port is 3069 if HOST_PORT is not set.

services:
  # PostgreSQL service (required for all setups)
  postgres:
    image: postgres:16-alpine
    container_name: matchzy-postgres-dev
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-matchzy_tournament}
    # No persistent volume - database data is ephemeral and will be lost on container removal
    # volumes:
    #   - postgres-data:/var/lib/postgresql/data
    # No port binding needed - DB is only accessible within Docker network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - matchzy-network

  matchzy-tournament:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        VITE_ENABLE_DEV_PAGE: 'true' # Enable dev page in local Docker builds
      # PostgreSQL required for all setups
    container_name: matchzy-tournament-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${HOST_PORT:-3069}:3069' # Single port - Caddy serves frontend at / and proxies /api to backend
    environment:
      # Treat local Docker stack as a development environment so that
      # dev-only features like simulation mode can be enabled from Settings.
      - NODE_ENV=development
      - PORT=3000 # Backend internal port (proxied by Caddy)
      # Token used by CS2 servers to authenticate webhooks
      - SERVER_TOKEN=${SERVER_TOKEN:-server123}
      # Auth providers (Steam / SSO)
      # Steam OpenID (players + future admin SSO)
      - AUTH_STEAM_ENABLED=${AUTH_STEAM_ENABLED:-true}
      # Optional: base URL of the frontend for post-login redirects (e.g. http://localhost:3069)
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-}
      # Keycloak OIDC (planned) – enable and point to your realm to advertise it to the UI
      - AUTH_KEYCLOAK_ENABLED=${AUTH_KEYCLOAK_ENABLED:-false}
      - KEYCLOAK_ISSUER_URL=${KEYCLOAK_ISSUER_URL:-}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-}
      - KEYCLOAK_CALLBACK_PATH=${KEYCLOAK_CALLBACK_PATH:-/api/auth/keycloak/callback}
      # Discord OAuth2
      - AUTH_DISCORD_ENABLED=${AUTH_DISCORD_ENABLED:-false}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:-}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI:-}
      # GitHub OAuth2
      - AUTH_GITHUB_ENABLED=${AUTH_GITHUB_ENABLED:-false}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_CALLBACK_URL=${GITHUB_CALLBACK_URL:-}
      # Logging controls (see docs/development/architecture.md → Logging section)
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      # Disable noisy per-request HTTP logs (still logs 4xx/5xx)
      - LOG_HTTP_REQUESTS=${LOG_HTTP_REQUESTS:-true}
      # Enable verbose per-query DB logs when debugging database issues
      - LOG_DB_VERBOSE=${LOG_DB_VERBOSE:-false}
      # Enable verbose RCON success logs (command spam); errors always log regardless
      - LOG_RCON_VERBOSE=${LOG_RCON_VERBOSE:-false}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-matchzy_tournament}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-matchzy_tournament}
      - VITE_ENABLE_DEV_PAGE=true # Enable dev page in local Docker builds
    volumes:
      # Persist demos and other data
      - ./data:/app/data
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3069/health']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - matchzy-network

networks:
  matchzy-network:
    driver: bridge

volumes:
  matchzy-data:
    driver: local
  # postgres-data removed - database is now ephemeral
