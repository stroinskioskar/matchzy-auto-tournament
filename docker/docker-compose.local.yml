# Minimal local build – builds from source instead of pulling from Docker Hub.
#
# First run (or after Dockerfile changes):
#   docker compose -f docker/docker-compose.local.yml up -d --build
#
# Subsequent runs:
#   docker compose -f docker/docker-compose.local.yml up -d
#
# Environment variables are loaded from:
#   - ../.env file (project root) via env_file directive
#   - Environment variables set in your shell (for docker-compose variable substitution)
#
# Default port: 3069 (use HOST_PORT=27016 to override)

services:
  postgres:
    image: postgres:16-alpine
    container_name: matchzy-postgres-dev
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-matchzy_tournament}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - matchzy-network

  matchzy-tournament:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        VITE_ENABLE_DEV_PAGE: 'true'
    container_name: matchzy-tournament-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - '${HOST_PORT:-3069}:3069'
    environment:
      # Container-specific settings (not from .env)
      - NODE_ENV=development
      - PORT=3000
      - VITE_ENABLE_DEV_PAGE=true
      # Docker service name for DB connection (not from .env)
      - DB_HOST=postgres
      # Computed DATABASE_URL (uses DB_* vars from .env or defaults)
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-matchzy_tournament}
      # All other variables (SERVER_TOKEN, STEAM_API_KEY, FRONTEND_BASE_URL, LOG_LEVEL, etc.)
      # are loaded from .env via env_file directive above
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3069/health']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - matchzy-network

networks:
  matchzy-network:
    driver: bridge
